name: Buy Lottery

on:
  schedule:
    - cron: "30 19 * * 6"
      timezone: "Asia/Seoul"
  workflow_dispatch:
    inputs:
      product:
        description: "lotto, pension, or all"
        required: true
        default: "all"
      count:
        description: "Purchase count, 1-5"
        required: true
        default: "5"

jobs:
  buy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run lottery buyer
        env:
          DHL_USER_ID: ${{ secrets.DHL_USER_ID }}
          DHL_PASSWORD: ${{ secrets.DHL_PASSWORD }}
          LOTTO_BUY_COUNT: ${{ github.event.inputs.count || secrets.LOTTO_BUY_COUNT || '5' }}
          LOTTERY_AUTO_BUY_ENABLED: ${{ secrets.LOTTERY_AUTO_BUY_ENABLED }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          PRODUCT="${{ github.event.inputs.product || 'all' }}"
          python lottery_bot.py buy --product "$PRODUCT" --count "$LOTTO_BUY_COUNT" --notify --require-enabled

name: Fetch Lotto Results

on:
  schedule:
    - cron: "10 14 * * 6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run crawler
        run: python lotto_crawler.py --output page/allLottoResults.json

      - name: Commit generated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add page/allLottoResults.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update page/allLottoResults.json (automated)"
            git push
          else
            echo "No changes to commit"
          fi

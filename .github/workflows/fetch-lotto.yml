name: Fetch Lotto Results

on:
  schedule:
    - cron: "0 12 * * 6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run crawler
        run: python lotto_crawler.py --output page/allLottoResults.json

      - name: Commit generated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add page/allLottoResults.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update page/allLottoResults.json (automated)"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Notify Discord
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python discord_notify.py --input page/allLottoResults.json
